<!DOCTYPE html>
<html lang="zh" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>押沙龙，押沙龙！— 人物关系图</title>
  <style>
    .tab-nav-bar {
      display: flex;
      gap: 0;
      margin-top: 14px;
    }

    .tab-nav-bar a {
      padding: 8px 20px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.04em;
      text-decoration: none;
      display: inline-block;
    }

    .tab-nav-bar a:hover {
      color: var(--accent);
    }

    .tab-nav-bar a.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
  </style>
  <meta name="description" content="《押沙龙，押沙龙！》威廉·福克纳 — 交互式人物关系图，探索萨特潘家族的悲剧命运。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Background canvas for relationship lines -->
  <canvas id="canvas"></canvas>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="book-label">William Faulkner</span>
        <h1>押沙龙，押沙龙！</h1>
        <span class="book-subtitle">Absalom, Absalom!</span>
      </div>
      <div class="header-controls">
        <button class="filter-btn active" data-filter="all" id="filter-all">全部</button>
        <button class="filter-btn" data-filter="sutpen" id="filter-sutpen">萨特潘家族</button>
        <button class="filter-btn" data-filter="compson" id="filter-compson">康普生家族</button>
        <button class="filter-btn" data-filter="coldfield" id="filter-coldfield">科德菲尔德家族</button>
        <button class="filter-btn" data-filter="bon" id="filter-bon">邦家族</button>
        <button class="filter-btn" data-filter="narrator" id="filter-narrator">叙事者</button>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="切换明暗模式" title="切换明暗模式">
        <span class="theme-icon-dark">🌙</span>
        <span class="theme-icon-light">☀️</span>
      </button>
    </div>
    <nav class="tab-nav-bar" role="tablist" aria-label="页面导航">
      <a href="index.html" class="active" role="tab" aria-selected="true">人物关系图</a>
      <a href="chapters.html" role="tab">逐章导览</a>
    </nav>
    <p class="header-desc">点击角色查看详情，连线代表人物关系。悬停连线查看关系类型。</p>
  </header>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><span class="legend-line marriage"></span>婚姻</div>
    <div class="legend-item"><span class="legend-line parent"></span>父子/母子</div>
    <div class="legend-item"><span class="legend-line romance"></span>情感</div>
    <div class="legend-item"><span class="legend-line conflict"></span>冲突/敌对</div>
    <div class="legend-item"><span class="legend-line friendship"></span>友谊/叙述</div>
  </div>

  <!-- Map container -->
  <main class="map-container" id="map">
    <!-- Characters are rendered dynamically by JS -->
  </main>

  <!-- Detail Panel -->
  <aside class="detail-panel" id="detail-panel">
    <button class="detail-close" id="detail-close" aria-label="关闭">✕</button>
    <div class="detail-content" id="detail-content">
      <p class="detail-hint">选择一个角色以查看详情</p>
    </div>
  </aside>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip"></div>

  <script src="app.js"></script>
</body>

</html>
